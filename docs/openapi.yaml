  # ----- TOPICS (V2) -----
  /api/v2/topics:
    get:
      tags: [Topics]
      summary: Get all topics (MongoDB)
      description: Public endpoint. Supports pagination, filtering, and sorting.
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - name: status
          in: query
          schema: { type: string, enum: [OPEN, CLOSED] }
          description: Filter by status
        - name: ownerId
          in: query
          schema: { type: string }
          description: Filter by owner user ID
        - name: sortBy
          in: query
          schema: { type: string, enum: [createdAt, title, updatedAt], default: createdAt }
          description: Field to sort by
        - $ref: '#/components/parameters/SortOrderParam'
      responses:
        '200':
          description: Paged list of topics
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PagedTopicResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
    post:
      tags: [Topics]
      summary: Create a topic (MongoDB)
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateTopicRequest' }
      responses:
        '201':
          description: Topic created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TopicResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

