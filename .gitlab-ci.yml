# .gitlab-ci.yml
# Use .NET 8 SDK as the default for all jobs.
image: mcr.microsoft.com/dotnet/sdk:8.0

# Defines the stages for the CI/CD pipeline.
# For now, we only have a 'test' stage.
stages:
  - test

# Defines a cache to speed up subsequent pipeline runs by reusing downloaded dependencies.
# The cache is invalidated and re-uploaded if the project files change.
cache:
  key:
    files:
      - global.json
      - src/CIS-Phase2-Crowdsourced-Ideation/CIS-Phase2-Crowdsourced-Ideation.csproj
  paths:
    - .nuget/packages/

# This is the job that runs our tests.
dotnet-test:
  # Assigns this job to the 'test' stage.
  stage: test
  variables:
    NUGET_PACKAGES: "$CI_PROJECT_DIR/.nuget/packages"
  # The script that will be executed by the runner.
  # It restores, runs all tests, and generates a coverage report (XPlat Code Coverage).
  script:
    - dotnet --info
    - dotnet restore
    - rm -rf test/TestResults coverage-report
    - mkdir -p test/TestResults
    - dotnet test --configuration Release --no-restore --results-directory test/TestResults --collect:"XPlat Code Coverage" --logger "junit;LogFilePath=test/TestResults/TEST-results.xml"
    - dotnet tool restore
    - dotnet tool run reportgenerator -reports:"test/TestResults/**/coverage.cobertura.xml" -targetdir:"coverage-report" -reporttypes:Html;Cobertura
  # Defines artifacts to be saved after the job completes.
  artifacts:
    # We always save the test reports, even if the job fails, to allow for inspection.
    when: always
    # Specifies the path to the test reports.
    paths:
      - test/TestResults/
      - coverage-report/
    # Sets an expiration date for the artifacts to save storage space.
    expire_in: 1 week
    # Allows GitLab to parse the JUnit report format for display in the UI (e.g., in Merge Requests).
    reports:
      junit:
        - test/TestResults/TEST-*.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage-report/Cobertura.xml
  # Defines the rules for when this job should run.
  rules:
    # Rule 1: Run this job on any push to the 'main' branch.
    - if: '$CI_COMMIT_BRANCH == "main"'
    # Rule 2: Run this job for any merge request event targeting the 'main' branch.
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"'
